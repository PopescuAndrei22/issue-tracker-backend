spring:
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  h2:
    console:
      enabled: true
      path: /h2-console

  logging:
    structured:
      format:
        console: ecs
        file: ecs
    file:
      name: logs/app.log
    logback:
      rollingpolicy:
        max-file-size: 10MB
        total-size-cap: 100MB
        max-history: 7